<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワークシート</title>
    <link rel="stylesheet" href="host.css">
</head>
<body>
    <div class="container">
        <h1>ワークシート</h1>
        <div id="worksheet-content">
            <!-- ワークシートの内容をここに追加 -->
            <textarea id="worksheet-text" rows="10" cols="50"></textarea>
        </div>
        <button id="send">送信</button>
        <button id="back">戻る</button>
    </div>
    <script src="worksheet.js"></script>
</body>
</html>
