<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投票</title>
    <link rel="stylesheet" href="host.css">
</head>
<body>
    <div class="container">
        <h1>投票</h1>
        <div id="vote-content">
            <!-- 投票の内容をここに追加 -->
            <input type="text" id="vote-question" placeholder="投票の質問">
            <input type="text" id="vote-option1" placeholder="選択肢1">
            <input type="text" id="vote-option2" placeholder="選択肢2">
        </div>
        <button id="start-vote-btn">投票開始</button>
        <button id="back-btn">戻る</button>
    </div>
    <script src="vote.js"></script>
</body>
</html>
