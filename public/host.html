<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主催者側 メイン画面</title>
    <link rel="stylesheet" href="host.css">
</head>
<body>
    <div class="container">
        <h1 id="event-name">イベント名</h1>
        <div class="main-content">
            <div class="left-panel">
                <div id="versatile-space">
                    <h2>汎用スペース</h2>
                    <p>(投票/リアクションを表示)</p>
                </div>
                <div class="bottom-panel">
                    <p id="connection-count">接続: 0人</p>
                    <button id="worksheet-btn">ワークシート</button>
                    <button id="vote-btn">投票</button>
                    <button id="end-event-btn">イベントを終了</button>
                </div>
            </div>
            <div class="right-panel">
                <div id="chat-display">
                    <h2>チャット表示画面</h2>
                    <div id="chat-messages"></div>
                </div>
                <div id="question-display">
                    <h2>質問表示画面</h2>
                    <div id="questions"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="host.js"></script>
</body>
</html>

<!-- worksheet.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワークシート</title>
    <link rel="stylesheet" href="host.css">
</head>
<body>
    <div class="container">
        <h1>ワークシート</h1>
        <div id="worksheet-content">
            <!-- ワークシートの内容をここに追加 -->
            <textarea id="worksheet-text" rows="10" cols="50"></textarea>
        </div>
        <button id="save-btn">保存</button>
        <button id="back-btn">戻る</button>
    </div>
    <script src="worksheet.js"></script>
</body>
</html>

<!-- vote.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投票</title>
    <link rel="stylesheet" href="host.css">
</head>
<body>
    <div class="container">
        <h1>投票</h1>
        <div id="vote-content">
            <!-- 投票の内容をここに追加 -->
            <input type="text" id="vote-question" placeholder="投票の質問">
            <input type="text" id="vote-option1" placeholder="選択肢1">
            <input type="text" id="vote-option2" placeholder="選択肢2">
        </div>
        <button id="start-vote-btn">投票開始</button>
        <button id="back-btn">戻る</button>
    </div>
    <script src="vote.js"></script>
</body>
</html>
